<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VCE-61 One-to-One Booking — June 2026</title>
<style>
/* ── Google Fonts ── */
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy: #0f2544;
  --navy-light: #1a3a6b;
  --accent: #2a7fff;
  --accent-light: #e8f1ff;
  --green: #0e7c4a;
  --green-bg: #e6f7ef;
  --green-border: #6fcca0;
  --red: #b91c1c;
  --red-bg: #fef2f2;
  --red-border: #fca5a5;
  --gold: #b45309;
  --gold-bg: #fffbeb;
  --gold-border: #fcd34d;
  --text: #0f2544;
  --text-muted: #64748b;
  --border: #e2e8f0;
  --surface: #f8fafc;
  --white: #ffffff;
  --radius: 10px;
  --radius-lg: 16px;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--surface);
  color: var(--text);
  min-height: 100vh;
}

header {
  background: var(--navy);
  color: white;
  padding: 2rem 1.5rem 1.75rem;
  text-align: center;
}
header .label {
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.12em;
  color: #93b8f0;
  margin-bottom: 8px;
  text-transform: uppercase;
}
header h1 {
  font-size: clamp(20px, 5vw, 28px);
  font-weight: 600;
  color: white;
  margin-bottom: 6px;
}
header p { font-size: 14px; color: #93b8f0; }

.stats-bar {
  display: flex;
  justify-content: center;
  background: var(--navy-light);
  border-top: 1px solid rgba(255,255,255,0.08);
}
.stat-item {
  padding: 12px 24px;
  text-align: center;
  border-right: 1px solid rgba(255,255,255,0.08);
  flex: 1;
  max-width: 160px;
}
.stat-item:last-child { border-right: none; }
.stat-num { font-size: 22px; font-weight: 600; color: white; }
.stat-lbl { font-size: 11px; color: #93b8f0; margin-top: 1px; }

.main { max-width: 680px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }

/* Live sync badge */
.sync-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  background: white;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 1rem;
  font-family: 'DM Mono', monospace;
}
.sync-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #94a3b8;
  flex-shrink: 0;
  transition: background 0.3s;
}
.sync-dot.syncing { background: var(--gold); animation: pulse 1s infinite; }
.sync-dot.synced  { background: var(--green); }
.sync-dot.error   { background: var(--red); }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.legend {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 1.25rem;
  padding: 10px 14px;
  background: white;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 13px;
  color: var(--text-muted);
}
.leg { display: flex; align-items: center; gap: 7px; }
.dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.dot-open    { background: var(--green); }
.dot-taken   { background: #dc2626; }
.dot-meeting { background: var(--accent); }

.day-card {
  background: white;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  margin-bottom: 10px;
  overflow: hidden;
}
.day-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.day-head.meeting { background: var(--accent-light); border-bottom-color: #bfdbfe; }
.day-info { display: flex; align-items: center; gap: 10px; }
.day-num {
  width: 36px; height: 36px;
  background: var(--navy);
  color: white;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 600;
  font-family: 'DM Mono', monospace;
  flex-shrink: 0;
}
.day-num.meeting-num { background: var(--accent); }
.day-label { font-size: 14px; font-weight: 500; color: var(--text); }
.day-sub   { font-size: 12px; color: var(--text-muted); margin-top: 1px; }

.day-badge {
  font-size: 11px; font-weight: 500;
  padding: 3px 10px; border-radius: 20px;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.04em;
}
.badge-meeting { background: var(--accent-light); color: var(--accent); border: 1px solid #bfdbfe; }
.badge-open    { background: var(--green-bg);    color: var(--green);  border: 1px solid var(--green-border); }
.badge-full    { background: var(--red-bg);      color: var(--red);    border: 1px solid var(--red-border); }

.slots-row { display: flex; gap: 8px; padding: 12px 16px; flex-wrap: wrap; }

.slot-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 16px;
  border-radius: var(--radius);
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  cursor: pointer;
  border: 1.5px solid;
  transition: transform 0.1s, opacity 0.1s;
}
.slot-btn:active { transform: scale(0.97); }
.slot-open  { background: var(--green-bg); border-color: var(--green-border); color: var(--green); }
.slot-open:hover { background: #c6f0dc; }
.slot-taken { background: var(--red-bg); border-color: var(--red-border); color: var(--red); cursor: not-allowed; opacity: 0.85; }
.slot-mine  { background: var(--accent-light); border-color: #93c5fd; color: #1d4ed8; cursor: pointer; }
.slot-mine:hover { background: #dbeafe; }
.slot-icon { font-size: 15px; }

.meeting-notice {
  padding: 12px 16px; font-size: 13px; color: #1d4ed8;
  display: flex; align-items: center; gap: 8px;
}

/* Modal */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(15, 37, 68, 0.5);
  z-index: 100; align-items: center; justify-content: center; padding: 1rem;
}
.overlay.show { display: flex; }
.modal {
  background: white; border-radius: var(--radius-lg);
  padding: 1.75rem; width: 100%; max-width: 400px;
  box-shadow: 0 20px 60px rgba(15,37,68,0.2);
}
.modal-slot-info {
  background: var(--accent-light); border: 1px solid #bfdbfe;
  border-radius: var(--radius); padding: 10px 14px;
  margin-bottom: 1.25rem; font-size: 14px; color: #1d4ed8; font-weight: 500;
}
.modal h3 { font-size: 17px; font-weight: 600; color: var(--navy); margin-bottom: 4px; }
.modal p  { font-size: 13px; color: var(--text-muted); margin-bottom: 1.25rem; }
.modal label { display: block; font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 5px; }
.modal input {
  width: 100%; padding: 10px 12px;
  border: 1.5px solid var(--border); border-radius: var(--radius);
  font-size: 14px; font-family: 'DM Sans', sans-serif; color: var(--text);
  margin-bottom: 1rem; outline: none; transition: border-color 0.15s;
}
.modal input:focus { border-color: var(--accent); }
.modal input.error { border-color: #dc2626; }
.modal-btns { display: flex; gap: 8px; }
.btn-confirm {
  flex: 1; padding: 11px;
  background: var(--navy); color: white; border: none;
  border-radius: var(--radius); font-size: 14px; font-weight: 500;
  font-family: 'DM Sans', sans-serif; cursor: pointer;
  transition: background 0.15s;
}
.btn-confirm:hover { background: var(--navy-light); }
.btn-confirm:disabled { opacity: 0.6; cursor: not-allowed; }
.btn-cancel {
  padding: 11px 18px; background: none; color: var(--text-muted);
  border: 1.5px solid var(--border); border-radius: var(--radius);
  font-size: 14px; font-family: 'DM Sans', sans-serif; cursor: pointer;
}
.btn-cancel:hover { background: var(--surface); }

/* Toast */
.success-toast {
  display: none; position: fixed;
  bottom: 1.5rem; left: 50%; transform: translateX(-50%);
  background: var(--navy); color: white;
  padding: 12px 20px; border-radius: 30px;
  font-size: 14px; font-weight: 500; white-space: nowrap;
  box-shadow: 0 4px 20px rgba(15,37,68,0.25);
  z-index: 200; transition: opacity 0.3s;
}
.success-toast.show { display: block; }

footer {
  text-align: center; font-size: 12px; color: var(--text-muted);
  padding: 1.5rem; font-family: 'DM Mono', monospace;
  border-top: 1px solid var(--border); margin-top: 1rem;
}

/* Loading skeleton */
.skeleton {
  background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
  background-size: 200% 100%;
  animation: shimmer 1.2s infinite;
  border-radius: var(--radius);
  height: 80px;
  margin-bottom: 10px;
}
@keyframes shimmer {
  0%   { background-position: -200% 0; }
  100% { background-position:  200% 0; }
}

@media (max-width: 480px) {
  header { padding: 1.5rem 1rem 1.25rem; }
  .stat-item { padding: 10px 12px; }
  .stat-num { font-size: 18px; }
  .slots-row { flex-direction: column; }
  .slot-btn { width: 100%; }
}
</style>
</head>
<body>

<header>
  <div class="label">VCE-61 · June 2026</div>
  <h1>One-to-One Booking</h1>
  <p>2-hour sessions · First come, first served</p>
</header>

<div class="stats-bar">
  <div class="stat-item"><div class="stat-num" id="s-total">—</div><div class="stat-lbl">Total Slots</div></div>
  <div class="stat-item"><div class="stat-num" id="s-booked">—</div><div class="stat-lbl">Booked</div></div>
  <div class="stat-item"><div class="stat-num" id="s-open">—</div><div class="stat-lbl">Available</div></div>
</div>

<div class="main">
  <div class="sync-bar">
    <div class="sync-dot" id="sync-dot"></div>
    <span id="sync-label">Loading shared schedule…</span>
  </div>

  <div class="legend">
    <div class="leg"><div class="dot dot-open"></div> Available</div>
    <div class="leg"><div class="dot dot-taken"></div> Taken</div>
    <div class="leg"><div class="dot dot-meeting"></div> Group meeting</div>
  </div>

  <div id="schedule">
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h3>Book this slot</h3>
    <p>Enter your name to confirm your 2-hour session.</p>
    <div class="modal-slot-info" id="modal-slot-info">—</div>
    <label for="modal-name">Your name</label>
    <input type="text" id="modal-name" placeholder="e.g. James Yap" autocomplete="off">
    <div class="modal-btns">
      <button class="btn-confirm" id="btn-confirm" onclick="confirmBook()">Confirm booking</button>
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<div class="success-toast" id="toast"></div>

<footer>VCE-61 · Sessions are 2 hours · Live shared schedule</footer>

<script>
// ─────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────
const STORAGE_KEY = "vce61-june-2026-slots";
const DAYS   = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const MEETING_DATE = "2026-06-22";

const INITIAL_SLOTS = {
  "2026-06-16|10:00 AM": null,
  "2026-06-16|2:00 PM":  null,
  "2026-06-17|10:00 AM": null,
  "2026-06-17|2:00 PM":  null,
  "2026-06-18|10:00 AM": "Mindy",
  "2026-06-18|2:00 PM":  null,
  "2026-06-19|10:00 AM": "Lily",
  "2026-06-21|2:00 PM":  "Jeremy",
  "2026-06-23|10:00 AM": null,
  "2026-06-23|2:00 PM":  "James Yap",
  "2026-06-24|10:00 AM": "Wilson",
  "2026-06-24|2:00 PM":  "Bc Yap",
  "2026-06-25|10:00 AM": null,
  "2026-06-25|2:00 PM":  null,
  "2026-06-26|10:00 AM": "Chiew",
  "2026-06-26|2:00 PM":  null,
  "2026-06-29|10:00 AM": null,
  "2026-06-29|2:00 PM":  null,
};

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let slots = JSON.parse(JSON.stringify(INITIAL_SLOTS));
let pending = null;

// ─────────────────────────────────────────────
// SYNC STATUS UI
// ─────────────────────────────────────────────
function setSyncStatus(state, msg) {
  const dot = document.getElementById("sync-dot");
  const lbl = document.getElementById("sync-label");
  dot.className = "sync-dot " + state;
  lbl.textContent = msg;
}

// ─────────────────────────────────────────────
// ANTHROPIC STORAGE (shared across all visitors)
// ─────────────────────────────────────────────
async function loadFromCloud() {
  setSyncStatus("syncing", "Loading shared schedule…");
  try {
    const res = await fetch("./proxy.php", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: `You are a simple key-value storage assistant for a booking system.
When asked to GET a key, respond ONLY with a raw JSON object (no markdown, no explanation):
{"found": true, "value": <the stored value>} if the key exists, or {"found": false} if not.
When asked to SET a key, respond ONLY with: {"ok": true}
The storage key is: ${STORAGE_KEY}`,
        messages: [{
          role: "user",
          content: `GET key: ${STORAGE_KEY}`
        }]
      })
    });
    const data = await res.json();
    const text = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("");
    const clean = text.replace(/```json|```/g, "").trim();
    const parsed = JSON.parse(clean);
    if (parsed.found && parsed.value) {
      slots = parsed.value;
    }
    setSyncStatus("synced", "Live · shared schedule loaded");
  } catch (e) {
    console.warn("Cloud load failed, using initial data:", e);
    setSyncStatus("error", "Offline mode — changes won't sync");
  }
  renderStats();
  renderSchedule();
}

async function saveToCloud() {
  setSyncStatus("syncing", "Saving…");
  try {
    const res = await fetch("./proxy.php", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 100,
        system: `You are a simple key-value storage assistant. When asked to SET a key with a value, respond ONLY with: {"ok": true}
The storage key is: ${STORAGE_KEY}`,
        messages: [{
          role: "user",
          content: `SET key: ${STORAGE_KEY}\nValue: ${JSON.stringify(slots)}`
        }]
      })
    });
    await res.json();
    setSyncStatus("synced", "Saved · all members will see this update");
  } catch (e) {
    console.warn("Cloud save failed:", e);
    setSyncStatus("error", "Save failed — please retry");
  }
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
function fmtDate(iso) {
  const d = new Date(iso + "T12:00:00");
  return d.getDate() + " " + MONTHS[d.getMonth()] + " · " + DAYS[d.getDay()];
}
function getDayNum(iso) { return new Date(iso + "T12:00:00").getDate(); }

function renderStats() {
  const vals = Object.values(slots);
  const total  = vals.length;
  const booked = vals.filter(v => v).length;
  document.getElementById("s-total").textContent  = total;
  document.getElementById("s-booked").textContent = booked;
  document.getElementById("s-open").textContent   = total - booked;
}

function renderSchedule() {
  const container = document.getElementById("schedule");
  container.innerHTML = "";

  const grouped = {};
  Object.keys(slots).forEach(k => {
    const [date] = k.split("|");
    if (!grouped[date]) grouped[date] = [];
    grouped[date].push(k);
  });

  const allDates = Object.keys(grouped).sort();
  if (!grouped[MEETING_DATE]) allDates.push(MEETING_DATE);
  allDates.sort();

  allDates.forEach(date => {
    const isMeeting = date === MEETING_DATE;
    const card = document.createElement("div");
    card.className = "day-card";

    const slotKeys = (grouped[date] || []).sort();
    const allTaken = slotKeys.length > 0 && slotKeys.every(k => slots[k]);
    const anyOpen  = slotKeys.some(k => !slots[k]);

    let badgeHtml = "";
    if (isMeeting)    badgeHtml = `<span class="day-badge badge-meeting">Group meeting</span>`;
    else if (allTaken) badgeHtml = `<span class="day-badge badge-full">Full</span>`;
    else if (anyOpen)  badgeHtml = `<span class="day-badge badge-open">Available</span>`;

    card.innerHTML = `
      <div class="day-head ${isMeeting ? 'meeting' : ''}">
        <div class="day-info">
          <div class="day-num ${isMeeting ? 'meeting-num' : ''}">${getDayNum(date)}</div>
          <div>
            <div class="day-label">${fmtDate(date)}</div>
            <div class="day-sub">June 2026</div>
          </div>
        </div>
        ${badgeHtml}
      </div>
    `;

    if (isMeeting) {
      const notice = document.createElement("div");
      notice.className = "meeting-notice";
      notice.innerHTML = `<span>📅</span> Monthly group meeting — no one-to-one sessions on this day`;
      card.appendChild(notice);
    } else {
      const row = document.createElement("div");
      row.className = "slots-row";
      slotKeys.forEach(k => {
        const time = k.split("|")[1];
        const who  = slots[k];
        const btn  = document.createElement("button");
        btn.className = "slot-btn " + (who ? "slot-taken" : "slot-open");
        btn.innerHTML  = who
          ? `<span class="slot-icon">👤</span> ${time} · ${who}`
          : `<span class="slot-icon">+</span> ${time} · Available`;
        if (!who) btn.onclick = () => openModal(k, date, time);
        else btn.disabled = true;
        row.appendChild(btn);
      });
      card.appendChild(row);
    }

    container.appendChild(card);
  });
}

// ─────────────────────────────────────────────
// MODAL
// ─────────────────────────────────────────────
function openModal(key, date, time) {
  pending = key;
  document.getElementById("modal-slot-info").textContent = fmtDate(date) + " · " + time;
  document.getElementById("modal-name").value = "";
  document.getElementById("modal-name").classList.remove("error");
  document.getElementById("btn-confirm").disabled = false;
  document.getElementById("overlay").classList.add("show");
  setTimeout(() => document.getElementById("modal-name").focus(), 80);
}

function closeModal() {
  document.getElementById("overlay").classList.remove("show");
  pending = null;
}

async function confirmBook() {
  const name = document.getElementById("modal-name").value.trim();
  if (!name) { document.getElementById("modal-name").classList.add("error"); return; }

  // Optimistic update
  slots[pending] = name;
  document.getElementById("btn-confirm").disabled = true;
  closeModal();
  renderStats();
  renderSchedule();
  showToast("Booked! See you then, " + name + " 👋");

  // Persist to cloud
  await saveToCloud();
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3500);
}

// ─────────────────────────────────────────────
// EVENTS
// ─────────────────────────────────────────────
document.getElementById("overlay").addEventListener("click", function(e) {
  if (e.target === this) closeModal();
});
document.getElementById("modal-name").addEventListener("keydown", function(e) {
  if (e.key === "Enter") confirmBook();
});

// ─────────────────────────────────────────────
// INIT — load from cloud on page load
// ─────────────────────────────────────────────
loadFromCloud();

// Auto-refresh every 60 seconds to pick up other members' bookings
setInterval(loadFromCloud, 60000);
</script>
</body>
</html>
